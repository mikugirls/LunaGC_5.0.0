name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如：5.0.0）'
        required: true
        default: '5.0.0'
        type: string
      release:
        description: '是否发布 Release'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      release: ${{ steps.set_version.outputs.release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle wrapper (force 7.6.4)
        run: |
          ./gradlew wrapper --gradle-version 7.6.4 --distribution-type bin
          chmod +x gradlew

      - name: Get version and release flag
        id: set_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            RELEASE="true"
          else
            VERSION="${{ inputs.version }}"
            RELEASE="${{ inputs.release }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: |
          ./gradlew injectGitHash jar \
            -Pversion=${{ steps.set_version.outputs.version }} \
            -PskipHandbook=1 \
            --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            *.jar
          if-no-files-found: error

      - name: Upload assets to release
        if: steps.set_version.outputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.set_version.outputs.version }}
          files: |
            *.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
